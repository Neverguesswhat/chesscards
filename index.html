<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Card Chess — Prototype</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="wrap">
    <!-- LEFT: Board -->
    <div class="panel">
      <div class="boardArea">
        <div class="boardWithCaptured">
          <div id="board" class="board"></div>
          <div class="capturedRail">
            <div class="capturedHead">Captured</div>
            <div class="capturedGroup">
              <div class="capturedLabel">White</div>
              <div id="capturedWhite" class="capturedList"></div>
            </div>
            <div class="capturedGroup">
              <div class="capturedLabel">Black</div>
              <div id="capturedBlack" class="capturedList"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- RIGHT: Hands + Log -->
    <div class="side">
      <div class="panel">
        <div class="section" style="padding-bottom:0;">
          <div class="coach">
            <div id="coachIcon" class="coachIcon">🎯</div>
            <div id="coachText" class="coachText"></div>
          </div>
        </div>
        <div class="section">
          <div class="h cardsTitle" style="font-size:14px;">Your cards</div>
          <div class="pieceCardsWrap">
            <div id="pieceHand" class="cardsRow"></div>
            <div class="pieceActions">
              <button id="redrawPiecesBtn" class="btn ghost" title="Discard all 5 your cards and draw 5 new ones. Ends your turn.">Redraw Pieces</button>
              <button id="endTurnBtn" class="btn primary">End Turn</button>
              <button id="resetBtn" class="btn danger">Reset game</button>
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="section">
          <div class="sectionHead">
            <div>
              <div class="h">Battle Log</div>
              <div class="s">Win condition: checkmate.</div>
            </div>
          </div>
          <div class="divider"></div>
          <div id="log" class="log"></div>
        </div>
      </div>
    </div>
  </div>

<script src="./script.js"></script>
</body>
</html>
